name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/upload-artifact@v4

      - name: Set up Java 17
        uses: actions/checkout@v4`
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/setup-java@v4
        with:
          name: tallinosaurus-mod-jar
          path: build/libs/*.jar
